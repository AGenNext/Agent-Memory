# Netlify configuration for the Agent-Memory landing/docs site.
# The site is static HTML/CSS in ./website — no build step required.

[build]
  publish = "website"
  command = ""

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
