<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent Memory Learning Platform</title>
    <script src="https://cdn.jsdelivr.net/npm/fabric@5.3.0/dist/fabric.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            --primary: #ff6b35;
            --secondary: #004e89;
            --accent: #00d4aa;
            --bg: #0a0a0f;
            --surface: #12121a;
            --surface-light: #1a1a24;
            --text: #e8e8e8;
            --text-dim: #888;
            --success: #00d4aa;
            --error: #ff4757;
        }
        
        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }
        
        .app {
            display: grid;
            grid-template-columns: 280px 1fr 350px;
            grid-template-rows: 60px 1fr;
            height: 100vh;
        }
        
        .header {
            grid-column: 1 / -1;
            background: var(--surface);
            border-bottom: 1px solid rgba(255,255,255,0.05);
            display: flex;
            align-items: center;
            padding: 0 24px;
            gap: 24px;
        }
        
        .logo {
            font-size: 20px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .nav {
            display: flex;
            gap: 8px;
        }
        
        .nav-btn {
            padding: 8px 16px;
            background: transparent;
            border: none;
            color: var(--text-dim);
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.2s;
        }
        
        .nav-btn:hover, .nav-btn.active {
            background: var(--surface-light);
            color: var(--text);
        }
        
        .sidebar {
            background: var(--surface);
            border-right: 1px solid rgba(255,255,255,0.05);
            padding: 16px;
            overflow-y: auto;
        }
        
        .sidebar-title {
            font-size: 12px;
            text-transform: uppercase;
            color: var(--text-dim);
            margin-bottom: 12px;
            letter-spacing: 1px;
        }
        
        .course-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        .course-item {
            padding: 12px 16px;
            background: var(--surface-light);
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid transparent;
        }
        
        .course-item:hover {
            border-color: var(--primary);
        }
        
        .course-item.active {
            border-color: var(--accent);
            background: rgba(0, 212, 170, 0.1);
        }
        
        .course-title {
            font-weight: 600;
            margin-bottom: 4px;
        }
        
        .course-level {
            font-size: 11px;
            color: var(--text-dim);
            text-transform: uppercase;
        }
        
        .progress-bar {
            height: 4px;
            background: var(--surface);
            border-radius: 2px;
            margin-top: 8px;
            overflow: hidden;
        }
        
        .progress-fill {
            height: 100%;
            background: var(--accent);
            border-radius: 2px;
            transition: width 0.3s;
        }
        
        .main {
            background: var(--bg);
            position: relative;
            overflow: hidden;
        }
        
        .canvas-container {
            width: 100%;
            height: 100%;
            position: relative;
        }
        
        #graphCanvas {
            background: radial-gradient(ellipse at center, #1a1a24 0%, #0a0a0f 100%);
        }
        
        .canvas-controls {
            position: absolute;
            bottom: 24px;
            left: 24px;
            display: flex;
            gap: 8px;
        }
        
        .canvas-btn {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            background: var(--surface);
            border: 1px solid rgba(255,255,255,0.1);
            color: var(--text);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }
        
        .canvas-btn:hover {
            background: var(--surface-light);
            border-color: var(--primary);
        }
        
        .query-panel {
            background: var(--surface);
            border-left: 1px solid rgba(255,255,255,0.05);
            display: flex;
            flex-direction: column;
        }
        
        .query-header {
            padding: 16px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        
        .query-title {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 8px;
        }
        
        .query-input {
            width: 100%;
            height: 120px;
            background: var(--surface-light);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            padding: 12px;
            color: var(--text);
            font-family: 'Monaco', monospace;
            font-size: 13px;
            resize: none;
        }
        
        .query-input:focus {
            outline: none;
            border-color: var(--primary);
        }
        
        .run-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, var(--primary), #ff8f5a);
            border: none;
            border-radius: 8px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            margin-top: 12px;
        }
        
        .query-results {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
        }
        
        .result-item {
            background: var(--surface-light);
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 8px;
            font-family: 'Monaco', monospace;
            font-size: 12px;
            white-space: pre-wrap;
            word-break: break-all;
        }
        
        .result-item.error {
            border-left: 3px solid var(--error);
        }
        
        .result-item.success {
            border-left: 3px solid var(--success);
        }
        
        .live-indicator {
            position: absolute;
            top: 24px;
            right: 24px;
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            background: var(--surface);
            border-radius: 20px;
            font-size: 12px;
        }
        
        .live-dot {
            width: 8px;
            height: 8px;
            background: var(--success);
            border-radius: 50%;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .chat-container {
            position: fixed;
            bottom: 24px;
            right: 24px;
            width: 380px;
            height: 500px;
            background: var(--surface);
            border-radius: 16px;
            border: 1px solid rgba(255,255,255,0.1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }
        
        .chat-header {
            padding: 16px;
            background: linear-gradient(135deg, var(--secondary), #0070c9);
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .chat-avatar {
            width: 36px;
            height: 36px;
            background: rgba(255,255,255,0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .chat-title {
            font-weight: 600;
        }
        
        .chat-subtitle {
            font-size: 11px;
            opacity: 0.8;
        }
        
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .message {
            max-width: 85%;
            padding: 12px 16px;
            border-radius: 16px;
            font-size: 14px;
            line-height: 1.5;
        }
        
        .message.user {
            align-self: flex-end;
            background: var(--primary);
            color: white;
            border-bottom-right-radius: 4px;
        }
        
        .message.bot {
            align-self: flex-start;
            background: var(--surface-light);
            border-bottom-left-radius: 4px;
        }
        
        .chat-input-container {
            padding: 16px;
            border-top: 1px solid rgba(255,255,255,0.05);
            display: flex;
            gap: 8px;
        }
        
        .chat-input {
            flex: 1;
            padding: 12px 16px;
            background: var(--surface-light);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 24px;
            color: var(--text);
            font-size: 14px;
        }
        
        .chat-input:focus {
            outline: none;
            border-color: var(--accent);
        }
        
        .chat-send {
            width: 40px;
            height: 40px;
            background: var(--accent);
            border: none;
            border-radius: 50%;
            color: var(--bg);
            cursor: pointer;
        }
        
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .animate-in { animation: slideIn 0.3s ease-out; }
    </style>
</head>
<body>
    <div class="app">
        <header class="header">
            <div class="logo">🎓 Agent Memory Learn</div>
            <nav class="nav">
                <button class="nav-btn active" data-view="courses">Courses</button>
                <button class="nav-btn" data-view="canvas">Graph Canvas</button>
                <button class="nav-btn" data-view="playground">Query Playground</button>
                <button class="nav-btn" data-view="progress">My Progress</button>
            </nav>
            <div class="live-indicator">
                <span class="live-dot"></span>
                Live Connected
            </div>
        </header>
        
        <aside class="sidebar">
            <div class="sidebar-title">📚 Courses</div>
            <div class="course-list" id="courseList"></div>
        </aside>
        
        <main class="main">
            <div class="canvas-container">
                <canvas id="graphCanvas"></canvas>
            </div>
            <div class="canvas-controls">
                <button class="canvas-btn" onclick="canvas.zoomTo(1)" title="Reset">🔍</button>
                <button class="canvas-btn" onclick="addNode()" title="Add Node">➕</button>
                <button class="canvas-btn" onclick="clearCanvas()" title="Clear">🗑️</button>
                <button class="canvas-btn" onclick="saveCanvas()" title="Save">💾</button>
                <button class="canvas-btn" onclick="loadGraphData()" title="Load Data">📥</button>
            </div>
        </main>
        
        <aside class="query-panel">
            <div class="query-header">
                <div class="query-title">⚡ Query Playground</div>
                <textarea class="query-input" id="queryInput" placeholder="SELECT * FROM session;">SELECT * FROM session;</textarea>
                <button class="run-btn" onclick="runQuery()">▶ Run Query</button>
            </div>
            <div class="query-results" id="queryResults"></div>
        </aside>
    </div>
    
    <div class="chat-container">
        <div class="chat-header">
            <div class="chat-avatar">🤖</div>
            <div>
                <div class="chat-title">FAQ Assistant</div>
                <div class="chat-subtitle">Ask about SurrealDB</div>
            </div>
        </div>
        <div class="chat-messages" id="chatMessages">
            <div class="message bot">Hi! I'm your learning assistant. Ask me about SurrealDB, or click on graph nodes to explore!</div>
        </div>
        <div class="chat-input-container">
            <input class="chat-input" id="chatInput" placeholder="Ask a question..." onkeypress="if(event.key==='Enter')sendMessage()">
            <button class="chat-send" onclick="sendMessage()">➤</button>
        </div>
    </div>

    <script>
        // Canvas Setup
        const canvas = new fabric.Canvas('graphCanvas', {
            width: window.innerWidth - 630,
            height: window.innerHeight - 60,
            backgroundColor: 'transparent',
            selection: true,
        });
        
        window.addEventListener('resize', () => {
            canvas.setDimensions({
                width: window.innerWidth - 630,
                height: window.innerHeight - 60
            });
        });
        
        const nodeColors = {
            session: '#ff6b35', user: '#00d4aa', entity: '#0070c9',
            article: '#9c27b0', product: '#ff9800', ticket: '#f44336',
            solution: '#4caf50', decision: '#ffeb3b', default: '#666'
        };
        
        function createNode(id, label, type, x, y) {
            const color = nodeColors[type] || nodeColors.default;
            const circle = new fabric.Circle({
                radius: 35, fill: color, stroke: '#fff', strokeWidth: 2,
                originX: 'center', originY: 'center',
                shadow: new fabric.Shadow({ color: color, blur: 20, offsetX: 0, offsetY: 0 })
            });
            const text = new fabric.Text(label.split(':')[1] || label, {
                fontSize: 11, fill: '#fff', originX: 'center', originY: 'center', fontWeight: '600'
            });
            const group = new fabric.Group([circle, text], {
                left: x, top: y, originX: 'center', originY: 'center',
                hasControls: true, hasBorders: true, id: id, nodeType: type,
            });
            group.on('mousedown', () => loadRelatedData(id));
            canvas.add(group);
            return group;
        }
        
        function createEdge(fromNode, toNode, label) {
            const line = new fabric.Line([fromNode.left, fromNode.top, toNode.left, toNode.top], {
                stroke: '#444', strokeWidth: 2, strokeDashArray: [5, 5], selectable: false, evented: false
            });
            canvas.add(line);
            canvas.sendToBack(line);
        }
        
        function addNode() {
            const type = prompt('Node type (session/user/entity/article):', 'session');
            const label = prompt('Label:', 'new_node');
            if (type && label) createNode(`${type}:${Date.now()}`, label, type, canvas.width / 2, canvas.height / 2);
        }
        
        function clearCanvas() { canvas.clear(); canvas.backgroundColor = 'transparent'; }
        
        async function saveCanvas() {
            const nodes = canvas.getObjects('group').map(obj => ({
                id: obj.id, label: obj.id, type: obj.nodeType, x: obj.left, y: obj.top
            }));
            console.log('Saved:', { nodes, edges: [], viewport: { zoom: canvas.getZoom() } });
            alert('Canvas saved!');
        }
        
        function loadGraphData() {
            clearCanvas();
            const mockData = {
                nodes: [
                    { id: 'session:1', label: 'Session', type: 'session' },
                    { id: 'user:alice', label: 'Alice', type: 'user' },
                    { id: 'entity:1', label: 'Entity', type: 'entity' },
                    { id: 'decision:1', label: 'Decision', type: 'decision' },
                    { id: 'article:1', label: 'Article', type: 'article' },
                ],
                edges: [
                    { from: 'session:1', to: 'user:alice', label: 'user' },
                    { from: 'session:1', to: 'entity:1', label: 'has' },
                    { from: 'entity:1', to: 'decision:1', label: 'led_to' },
                    { from: 'decision:1', to: 'article:1', label: 'searched' },
                ]
            };
            renderGraph(mockData);
        }
        
        function renderGraph(data) {
            clearCanvas();
            const nodeMap = {};
            const centerX = canvas.width / 2, centerY = canvas.height / 2, radius = 150;
            data.nodes.forEach((node, i) => {
                const angle = (2 * Math.PI * i) / data.nodes.length - Math.PI / 2;
                const x = centerX + radius * Math.cos(angle);
                const y = centerY + radius * Math.sin(angle);
                nodeMap[node.id] = createNode(node.id, node.label || node.id.split(':')[1], node.type, x, y);
            });
            data.edges.forEach(edge => {
                if (nodeMap[edge.from] && nodeMap[edge.to]) createEdge(nodeMap[edge.from], nodeMap[edge.to], edge.label);
            });
            canvas.renderAll();
        }
        
        function loadRelatedData(nodeId) {
            document.getElementById('queryInput').value = 
                `-- Related to: ${nodeId}\nSELECT * FROM type::record('${nodeId}')\nSELECT * FROM entity WHERE session = '${nodeId}'\nSELECT * FROM decision WHERE session = '${nodeId}';`;
            canvas.getObjects('group').forEach(obj => {
                obj.item(0).set('stroke', obj.id === nodeId ? '#fff' : '#fff');
                obj.item(0).set('strokeWidth', obj.id === nodeId ? 4 : 2);
            });
            canvas.renderAll();
        }
        
        async function runQuery() {
            const resultsDiv = document.getElementById('queryResults');
            resultsDiv.innerHTML = '<div class="result-item">Running query...</div>';
            await new Promise(r => setTimeout(r, 500));
            const mockResults = [{ id: 'session:1', user_id: 'user:alice', status: 'active' }, { id: 'session:2', user_id: 'user:bob', status: 'completed' }];
            resultsDiv.innerHTML = `<div class="result-item success">✅ Query executed\n\n${JSON.stringify(mockResults, null, 2)}</div>`;
            loadGraphData();
        }
        
        const faqKnowledge = { 'install': 'curl -sSf https://install.surrealdb.com | sh', 'start': 'surreal start --user root --pass root memory', 'docker': 'docker run -p 8000:8000 surrealdb/surrealdb:latest', 'query': 'SELECT * FROM table;', 'graph': 'RELATE user:a -> knows -> user:b;', 'vector': 'SELECT * FROM article WHERE embedding <|5|> $query;', 'live': 'LIVE SELECT * FROM table;' };
        
        function sendMessage() {
            const input = document.getElementById('chatInput');
            const message = input.value.trim();
            if (!message) return;
            addMessage(message, 'user');
            input.value = '';
            setTimeout(() => addMessage(getBotResponse(message), 'bot'), 500);
        }
        
        function addMessage(text, sender) {
            const container = document.getElementById('chatMessages');
            const div = document.createElement('div');
            div.className = `message ${sender} animate-in`;
            div.textContent = text;
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }
        
        function getBotResponse(query) {
            query = query.toLowerCase();
            for (const [key, value] of Object.entries(faqKnowledge)) {
                if (query.includes(key)) return `Here's how:\n\`\`\`sql\n${value}\n\`\`\``;
            }
            return "I can help with SurrealDB! Try: install, start, docker, query, graph, vector, or live queries.";
        }
        
        const courses = [
            { id: 'course:1', title: 'Querying Fundamentals', level: 'beginner', progress: 75 },
            { id: 'course:2', title: 'Advanced Querying', level: 'intermediate', progress: 30 },
            { id: 'course:3', title: 'Data Models', level: 'beginner', progress: 0 },
            { id: 'course:4', title: 'Graph Relationships', level: 'intermediate', progress: 0 },
            { id: 'course:5', title: 'Schema Management', level: 'intermediate', progress: 0 },
            { id: 'course:6', title: 'Agent Memory', level: 'advanced', progress: 0 },
        ];
        
        function renderCourses() {
            const container = document.getElementById('courseList');
            courses.forEach(course => {
                const div = document.createElement('div');
                div.className = 'course-item';
                div.innerHTML = `<div class="course-title">${course.title}</div><div class="course-level">${course.level}</div><div class="progress-bar"><div class="progress-fill" style="width: ${course.progress}%"></div></div>`;
                container.appendChild(div);
            });
        }
        
        loadGraphData();
        renderCourses();
        document.querySelectorAll('.nav-btn').forEach(btn => {
            btn.onclick = () => {
                document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
            };
        });
    </script>
</body>
</html>
