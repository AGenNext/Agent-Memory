version: '3.8'

# Agent Memory Docker Compose
# Supports both in-memory and file-backed modes

services:
  # SurrealDB database (file-backed with RocksDB)
  surrealdb:
    image: surrealdb/surrealdb:latest
    container_name: agent-memory-db
    ports:
      - "8000:8000"
    command: >
      start 
      --log trace 
      --user root 
      --pass root 
      --allow-funcs 
      --allow-net 
      --allow-experimental 
      rocksdb:///data/memory.db
    volumes:
      - surrealdb_data:/data
    environment:
      - SURREALDB_USER=root
      - SURREALDB_PASS=root

  # SurrealDB In-Memory (alternative - uncomment to use)
  # surrealdb:
  #   image: surrealdb/surrealdb:latest
  #   container_name: agent-memory-db
  #   ports:
  #     - "8000:8000"
  #   command: start --log trace --user root --pass root --allow-funcs --allow-net --allow-experimental memory

  # SurrealDB with SurrealKV (alternative - uncomment to use)
  # surrealkv:
  #   image: surrealdb/surrealdb:latest
  #   container_name: agent-memory-db
  #   ports:
  #     - "8000:8000"
  #   command: >
  #     start 
  #     --log trace 
  #     --user root 
  #     --pass root 
  #     --allow-funcs 
  #     --allow-net 
  #     surrealkv:///data/memory.db

  # Agent application
  agent:
    build: .
    container_name: agent-memory-app
    ports:
      - "8001:8001"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    depends_on:
      - surrealdb
    # Run the load script first, then start agent
    command: >
      sh -c "echo 'Loading schema and data...' && 
             uv run load.py && 
             echo 'Starting agent...' && 
             uv run agent.py"

  # Surrealist Web UI
  surrealist:
    image: surrealdb/surrealist:latest
    container_name: agent-memory-ui
    ports:
      - "3000:3000"
    environment:
      - SURREALIST_HOST=0.0.0.0
      - SURREALIST_PORT=3000
      - SURREAL_DB_URL=ws://surrealdb:8000/rpc
      - SURREAL_DB_USER=root
      - SURREAL_DB_PASS=root
      - SURREAL_DB_NAMESPACE=memory
      - SURREAL_DB_DATABASE=agent
    depends_on:
      - surrealdb

# =====================================================
# Multi-Node Distributed Mode (TiKV)
# =====================================================

# Development single-node TiKV cluster
tikv:
  image: tikv/tikv:latest
  container_name: agent-memory-tikv
  ports:
    - "20160:20160"
    - "2379:2379"
  command: 
    - --addr
    - 0.0.0.0:20160
    - --advertise-addr
    - tikv:20160
    - --pd-endpoints
    - pd:2379
    - --data-dir
    - /tikv/data
  depends_on:
    - pd

# PD (Placement Driver) - coordinating service
pd:
  image: tikv/pd:latest
  container_name: agent-memory-pd
  ports:
    - "2379:2379"
    - "2380:2380"
  command:
    - --name
    - pd
    - --data-dir
    - /pd/data
    - --client-urls
    - http://0.0.0.0:2379
    - --peer-urls
    - http://0.0.0.0:2380
    - --initial-cluster
    - "pd=http://pd:2380"
    - --cluster-init

# SurrealDB with TiKV backend
surrealdb-tikv:
  image: surrealdb/surrealdb:latest
  container_name: agent-memory-db-distributed
  ports:
    - "8000:8000"
  command: >
    start 
    --log trace 
    --user root 
    --pass root 
    --allow-funcs 
    --allow-net 
    tikv://pd:2379
  depends_on:
    - pd
    - tikv

volumes:
  surrealdb_data: