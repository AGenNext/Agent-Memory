version: '3.8'

services:
  # SurrealDB database
  surrealdb:
    image: surrealdb/surrealdb:latest
    container_name: agent-memory-db
    ports:
      - "8000:8000"
    command: start --log trace --user root --pass root --allow-funcs --allow-net --allow-experimental memory
    volumes:
      - surrealdb_data:/memory
    environment:
      - SURREALDB_USER=root
      - SURREALDB_PASS=root

  # Agent application
  agent:
    build: .
    container_name: agent-memory-app
    ports:
      - "8001:8001"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    depends_on:
      - surrealdb
    # Run the load script first, then start agent
    command: >
      sh -c "echo 'Loading schema and data...' && 
             uv run load.py && 
             echo 'Starting agent...' && 
             uv run agent.py"

  # Surrealist Web UI
  surrealist:
    image: surrealdb/surrealist:latest
    container_name: agent-memory-ui
    ports:
      - "3000:3000"
    environment:
      - SURREALIST_HOST=0.0.0.0
      - SURREALIST_PORT=3000
      - SURREAL_DB_URL=ws://surrealdb:8000/rpc
      - SURREAL_DB_USER=root
      - SURREAL_DB_PASS=root
      - SURREAL_DB_NAMESPACE=memory
      - SURREAL_DB_DATABASE=agent
    depends_on:
      - surrealdb

volumes:
  surrealdb_data: